server:
  name: llama-gateway
  host: 0.0.0.0
  port: 4000
  request_timeout_seconds: 300
  max_concurrent_requests: 64
  max_queue_size: 500
  queue_timeout_seconds: 30
  rate_limit_capacity: 60
  rate_limit_refill_per_second: 1.0

auth:
  enabled: false
  api_keys:
    - local-key

prompts:
  default_prompt: |
    You are a helpful assistant.
    Answer the question as truthfully as possible.
    If you don't know the answer, say "I don't know".

  prompt_with_tools: |
    You are a helpful assistant with access to tools.
    Answer the question as truthfully as possible.
    If you don't know the answer, say "I don't know".
    Use the tools when appropriate.

  prompt_with_embeddings: |
    You are a helpful assistant with access to embeddings.
    Answer the question as truthfully as possible.
    If you don't know the answer, say "I don't know".
    Use the embeddings when appropriate.

  rag_prompt: |
      Use the following context to answer the user's question.

      Context:
      {{context}}

      Question:
      {{question}}

      If the answer is not contained in the context, say you don't know.

rags:
  - name: rag_01
    url: http://localhost:6333
    type: qdrant            # qdrant | milvus | chroma | pgvector
    collection: documents
    top_k: 5
    min_score: 0.7

backends:
  - name: llama-fast
    # url: http://llama-fast:8081
    url: http://localhost:8081
    model: llama-fast
    prompt_name: default_prompt
    tags:
      - chat
      - fast
    priority: 10

  - name: qwen-tools
    # url: http://qwen-tools:8082
    url: http://localhost:8082
    model: qwen-tools
    prompt_name: prompt_with_tools
    tags:
      - chat
      - tools
    priority: 20

  - name: embeddings
    # url: http://embeddings:8083
    url: http://localhost:8083
    model: embeddings
    prompt_name: prompt_with_embeddings
    tags:
      - embeddings
    priority: 30

  - name: backend-with-rag
    # url: http://embeddings:8083
    url: http://localhost:8084
    model: llama-fast
    rag_name: rag_01
    prompt_name: rag_prompt
    tags:
      - rag
    priority: 40

routing:
  default_backend: llama-fast
  rules:
    - name: embeddings
      endpoint: /v1/embeddings
      backend: embeddings
    - name: tools
      requires_tools: true
      backend: qwen-tools

logging:
  enabled: true