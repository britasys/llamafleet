server:
  name: llama-gateway
  host: 0.0.0.0
  port: 4000
  request_timeout_seconds: 300

auth:
  enabled: false
  api_keys:
    - local-key

backends:
  - name: llama-fast
    url: http://llama-fast:8081
    model: llama-fast
    tags:
      - chat
      - fast
    priority: 10

  - name: qwen-tools
    url: http://qwen-tools:8082
    model: qwen-tools
    tags:
      - chat
      - tools
    priority: 20

  - name: embeddings
    url: http://embeddings:8083
    model: embeddings
    tags:
      - embeddings
    priority: 30

routing:
  default_backend: llama-fast
  rules:
    - name: embeddings
      endpoint: /v1/embeddings
      backend: embeddings
    - name: tools
      requires_tools: true
      backend: qwen-tools

logging:
  enabled: true
